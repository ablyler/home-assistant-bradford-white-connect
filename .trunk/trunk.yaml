# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@22.16.0
    - python@3.14.4
lint:
  enabled:
    - grype@0.116.0
    - osv-scanner@2.4.0
    - pinact@4.1.0
    - mypy@2.3.0
    - checkov@3.3.8
    - trivy@0.72.0
    - hadolint@2.14.0
    - markdownlint@0.49.1
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - flake8@7.3.0
    - git-diff-check
    - isort@8.0.1
    - prettier@3.9.5
    - ruff@0.15.22
    - taplo@0.10.0
    - trufflehog@3.95.9
    - yamllint@1.38.0
  ignore:
    - linters: [ALL]
      paths:
        # GitHub Issue Templates
        - .github/ISSUE_TEMPLATE/**
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
